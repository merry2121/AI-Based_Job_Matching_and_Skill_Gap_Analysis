<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Dashboard - AI Job Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .navbar {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .navbar-user span {
            color: #334155;
            font-weight: 500;
        }
        .btn-logout {
            padding: 8px 16px;
            background: #1e293b;
            color: white;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background: #0f172a;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }
        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        .file-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        .btn {
            padding: 14px 32px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0f172a;
        }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
        }
        th {
            text-align: left;
            padding: 16px;
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.9rem;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
        .badge {
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 4px;
            display: inline-block;
        }
        .match-score {
            font-weight: 600;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">AI Job Matcher</div>
        <div class="navbar-user">
            <span>Welcome, {{ user.username }}</span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </div>

    <div class="card">
        <h2>Find Your Perfect Job</h2>
        <form id="uploadForm">
            <div class="form-group">
                <label for="cvFile">Your CV (PDF)</label>
                <input type="file" id="cvFile" accept=".pdf" required class="file-input">
            </div>
            <button type="button" id="matchBtn" class="btn">Find Matching Jobs</button>
        </form>

        <div id="status" class="status" style="display: none;"></div>

        <div id="results" style="display: none;">
            <h3 style="margin: 40px 0 20px; color: #1e293b;">Top 5 Recommended Jobs in Ethiopia</h3>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Location</th>
                        <th>Match Score</th>
                        <th>Missing Skills</th>
                        <th>Recommendations</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>

    <script src="/static/seeker_script.js"></script>
</body>
</html>
