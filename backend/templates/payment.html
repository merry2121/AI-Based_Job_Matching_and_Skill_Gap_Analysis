<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - AI Job Matching</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .payment-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        h2 { color: #1e293b; margin-bottom: 20px; }
        .amount-options { margin: 30px 0; }
        .amount-btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
        }
        .amount-btn:hover { background: #e2e8f0; }
        .selected { background: #1e293b; color: white; border-color: #1e293b; }
        button {
            width: 100%;
            padding: 14px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        input { display: none; }
    </style>
</head>
<body>
    <div class="payment-container">
        <h2>💰 Make a Payment</h2>
        {% if success %}
        <div class="success">✅ Payment of ETB {{ amount }} completed successfully!</div>
        {% endif %}
        
        <form method="post" action="/create-payment">
            <div class="amount-options">
                <div class="amount-btn" onclick="selectAmount(50)">50 ETB<br><small>Single Job Post</small></div>
                <div class="amount-btn" onclick="selectAmount(200)">200 ETB<br><small>5 Job Posts</small></div>
                <div class="amount-btn" onclick="selectAmount(500)">500 ETB<br><small>Monthly Subscription</small></div>
            </div>
            <input type="hidden" name="amount" id="amount" value="50">
            <input type="hidden" name="payment_type" value="job_posting">
            <button type="submit">Pay Now</button>
        </form>
        <p style="margin-top: 20px; font-size: 12px; color: #94a3b8;">Secure payment processing</p>
    </div>
    <script>
        function selectAmount(amount) {
            document.getElementById('amount').value = amount;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }
    </script>
</body>
</html>
