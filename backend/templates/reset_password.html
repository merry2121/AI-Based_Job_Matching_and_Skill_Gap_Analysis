<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Job Matcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            max-width: 440px;
            width: 100%;
            padding: 48px 40px;
        }
        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #1e293b;
        }
        .btn {
            width: 100%;
            padding: 14px 16px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0f172a;
        }
        .links {
            margin-top: 24px;
            text-align: center;
        }
        .links a {
            color: #1e293b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 40px;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .alert-danger {
            background: #fce4e4;
            color: #c62828;
            border: 1px solid #f5c6cb;
        }
        .hint {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set New Password</h2>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        {% if token %}
            <form method="post">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required>
                    <div class="hint">8-20 chars, with uppercase, lowercase, digit, special</div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
        {% else %}
            <p>The reset link is invalid or has expired.</p>
            <div class="links">
                <a href="/forgot-password">Request new link</a>
            </div>
        {% endif %}
        <div class="links">
            <a href="/login">Back to Login</a>
        </div>
    </div>
</body>
</html>
