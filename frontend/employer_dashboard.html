<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand mb-0 h1">AI Job Matcher - Employer</span>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Upload Job Description and Candidate Resumes</h2>
        <form id="uploadForm">
            <div class="mb-3">
                <label for="jobdescFile" class="form-label">Job Description (PDF)</label>
                <input class="form-control" type="file" id="jobdescFile" accept=".pdf" required>
            </div>
            <div class="mb-3">
                <label for="candidateFiles" class="form-label">Candidate Resumes (PDF, multiple allowed)</label>
                <input class="form-control" type="file" id="candidateFiles" accept=".pdf" multiple required>
            </div>
            <button type="button" id="rankBtn" class="btn btn-primary">Rank Candidates</button>
        </form>

        <div id="candidateStatus" class="mt-3"></div>

        <table id="rankingTable" class="table table-striped mt-4" style="display:none;">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Candidate</th>
                    <th>Match Score</th>
                    <th>Missing Skills</th>
                    <th>Recommendations</th>
                </tr>
            </thead>
            <tbody id="rankingBody"></tbody>
        </table>
    </div>

    <script src="employer_script.js"></script>
</body>
</html>
